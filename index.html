  <!DOCTYPE html>
<html>
<head>
<title>Islamic Quiz Game</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(to right,#0f2027,#2c5364);
color:white;
margin:0;
padding:20px;
}

h1{
margin-bottom:10px;
}

button{
display:block;
margin:10px auto;
padding:12px 25px;
background:#00c853;
color:white;
border:none;
border-radius:10px;
font-size:16px;
width:200px;
}

button:hover{
background:#00a844;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:15px;
max-width:300px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

#score{
margin-top:10px;
font-size:18px;
}
</style>

</head>

<body>

<h1>🕌 Islamic Quiz Game</h1>

<div id="menu">
<h2>Select Level</h2>
<button onclick="startGame(10)">Easy</button>
<button onclick="startGame(20)">Medium</button>
<button onclick="startGame(30)">Hard</button>
</div>

<div id="quiz"></div>
<div id="score"></div>

<script>

let allQuestions = [
{q:"Wane ne Annabi na farko?",a:["Musa","Adam","Isa","Nuh"],correct:1},
{q:"Manzon Allah?",a:["Musa","Isa","Muhammad (SAW)","Nuh"],correct:2},
{q:"Sallah nawa a rana?",a:["3","4","5","6"],correct:2},
{q:"Inda Ka'aba take?",a:["Makka","Madina","Taif","Yemen"],correct:0},
{q:"Mala'ikan wahayi?",a:["Jibril","Mika'il","Israfil","Izra'il"],correct:0},
{q:"Khalifa na farko?",a:["Umar","Abu Bakr","Ali","Usman"],correct:1},
{q:"Azumi ana yi a?",a:["Ramadan","Shawwal","Rajab","Safar"],correct:0},
{q:"Surah mafi tsawo?",a:["Baqarah","Ikhlas","Nas","Falaq"],correct:0},
{q:"Annabi da kifi ya hadiye?",a:["Yunus","Musa","Isa","Nuh"],correct:0},
{q:"Annabi na ƙarshe?",a:["Muhammad","Isa","Musa","Nuh"],correct:0}
];

// shuffle
function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let questions=[];
let current=0;
let score=0;

function startGame(num){
document.getElementById("menu").style.display="none";
questions = shuffle(allQuestions).slice(0,num);
current=0;
score=0;
show();
}

function show(){
if(current>=questions.length){
document.getElementById("quiz").innerHTML=
"<div class='card'><h2>Finished 🎉</h2><h3>Score: "+score+"/"+questions.length+"</h3><button onclick='location.reload()'>Play Again</button></div>";
return;
}

let q=questions[current];

let html="<div class='card'>";
html+="<h3>"+q.q+"</h3>";

q.a.forEach((opt,i)=>{
html+="<button onclick='check("+i+")'>"+opt+"</button>";
});

html+="</div>";

document.getElementById("quiz").innerHTML=html;
document.getElementById("score").innerHTML="Score: "+score;
}

function check(i){
if(i===questions[current].correct) score++;
current++;
show();
}

</script>

</body>
</html>
