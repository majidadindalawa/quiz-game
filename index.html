<!DOCTYPE html>
<html>
<head>
<title>Islamic Quiz Game</title>
<style>
body{font-family:Arial;text-align:center;background:linear-gradient(to right,#0f2027,#2c5364);color:white;margin:0;padding:20px;}
h1{margin-bottom:10px;}
button{display:block;margin:10px auto;padding:12px 25px;background:#00c853;color:white;border:none;border-radius:10px;font-size:16px;width:220px;}
button:hover{background:#00a844;}
.card{background:white;color:black;padding:20px;border-radius:15px;max-width:350px;margin:auto;box-shadow:0 0 10px rgba(0,0,0,0.3);}
#score{margin-top:10px;font-size:18px;}
</style>
</head>
<body>

<h1>🕌 Islamic Quiz Game</h1>

<div id="menu">
<h2>Select Level</h2>
<button onclick="startGame(20)">Easy</button>
<button onclick="startGame(50)">Medium</button>
<button onclick="startGame(100)">Hard</button>
</div>

<div id="quiz"></div>
<div id="score"></div>

<!-- Sounds -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

// ✅ 100 Islamic questions (example)
let allQuestions = [
{q:"Wane ne Annabi na farko?",a:["Musa","Adam","Isa","Nuh"],correct:1},
{q:"Manzon Allah?",a:["Musa","Isa","Muhammad (SAW)","Nuh"],correct:2},
{q:"Sallah nawa a rana?",a:["3","4","5","6"],correct:2},
{q:"Inda Ka'aba take?",a:["Makka","Madina","Taif","Yemen"],correct:0},
{q:"Mala'ikan wahayi?",a:["Jibril","Mika'il","Israfil","Izra'il"],correct:0},
{q:"Khalifa na farko?",a:["Umar","Abu Bakr","Ali","Usman"],correct:1},
{q:"Uwar muminai ta farko?",a:["Aisha","Khadija","Hafsa","Fatima"],correct:1},
{q:"Azumi ana yi a?",a:["Ramadan","Shawwal","Rajab","Safar"],correct:0},
{q:"Surah mafi tsawo?",a:["Baqarah","Ikhlas","Nas","Falaq"],correct:0},
{q:"Annabi da kifi ya hadiye?",a:["Yunus","Musa","Isa","Nuh"],correct:0},
{q:"Hijira daga ina?",a:["Makka→Madina","Madina→Makka","Taif→Makka","Yemen→Makka"],correct:0},
{q:"Rukunin Musulunci nawa?",a:["5","4","6","7"],correct:0},
{q:"Sallar Fajr raka'a?",a:["2","3","4","5"],correct:0},
{q:"Masjid Nabawi yana?",a:["Madina","Makka","Taif","Yemen"],correct:0},
{q:"Annabi da aka jefa cikin wuta?",a:["Ibrahim","Musa","Isa","Yusuf"],correct:0},
{q:"Annabi da aka sayar?",a:["Yusuf","Musa","Isa","Nuh"],correct:0},
{q:"Annabi na ƙarshe?",a:["Muhammad","Isa","Musa","Nuh"],correct:0},
{q:"Mala'ikan mutuwa?",a:["Izra'il","Jibril","Mika'il","Israfil"],correct:0},
{q:"Littafin Musulunci?",a:["Qur'an","Bible","Torah","Zabur"],correct:0},
{q:"Sheikh Abdul Qadir Jilani ya shahara a?",a:["Tasawwuf","Fikhu","Tarihi","Hadin kai"],correct:0},

// 20-100: Zaka iya maimaita tsarin nan ka cika har 100
// Misali:
{q:"Sarki na farko a Musulunci?",a:["Abu Bakr","Umar","Ali","Usman"],correct:0},
{q:"Sallar Asr raka'a?",a:["3","4","5","2"],correct:1},
{q:"Annabi Yusuf ya shiga?",a:["Gidan fir'auna","Maka","Madina","Taif"],correct:0},
{q:"Wane sura ne Ikhlas?",a:["112","2","1","114"],correct:0},
{q:"Surah mafi ƙanƙanta?",a:["Al-Ikhlas","Al-Falaq","Al-Nas","Al-Kawthar"],correct:3},
{q:"Ramadan ya faru a wata?",a:["9th","10th","8th","11th"],correct:0},
{q:"Hajj nawa ne wajib?",a:["1","2","3","5"],correct:0},
{q:"Ka’aba tana birnin?",a:["Makka","Madina","Taif","Riyadh"],correct:0},
{q:"Sallar Maghrib raka'a?",a:["3","4","2","5"],correct:0},
{q:"Sallar Isha raka'a?",a:["4","3","2","5"],correct:0},
{q:"Annabi Musa ya tsallake ruwa?",a:["Red Sea","Nile","Euphrates","Tigris"],correct:0},
{q:"Annabi Isa ya tashi?",a:["Sama","Kasa","Ruwa","Daji"],correct:0},
{q:"Sunan matarsa Ali?",a:["Fatima","Aisha","Khadija","Hafsa"],correct:0},
{q:"Umar ibn Khattab ya kasance Khalifa nawa?",a:["2","3","4","1"],correct:2},
{q:"Sunan sura ta farko a Qur'an?",a:["Al-Fatiha","Al-Baqarah","Al-Ikhlas","An-Nas"],correct:0},
{q:"Wane Annabi ya gina jirgin ruwa?",a:["Nuh","Yusuf","Ibrahim","Isa"],correct:0},
{q:"Wane Annabi ya fitar da ruwa daga dutse?",a:["Musa","Isa","Yusuf","Muhammad"],correct:0},
{q:"Sunan sura mafi tsawo?",a:["Al-Baqarah","Al-Fatiha","Al-Nas","Al-Ikhlas"],correct:0},
{q:"Annabi Muhammad (SAW) ya fito daga birnin?",a:["Makka","Madina","Taif","Yemen"],correct:0},
{q:"Shahada tana nuni da?",a:["Iya Allah da Muhammad ManzonSa","Sallah","Azumi","Zakat"],correct:0}
];

function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

let questions=[], current=0, score=0;

function startGame(num){
document.getElementById("menu").style.display="none";
questions = shuffle(allQuestions).slice(0,num);
current=0; score=0;
show();
}

function show(){
if(current>=questions.length){
document.getElementById("quiz").innerHTML="<div class='card'><h2>Finished 🎉</h2><h3>Score: "+score+"/"+questions.length+"</h3><button onclick='location.reload()'>Play Again</button></div>";
return;
}
let q=questions[current];
let html="<div class='card'><h3>"+q.q+"</h3>";
q.a.forEach((opt,i)=>{html+="<button onclick='check("+i+")'>"+opt+"</button>";});
html+="</div>";
document.getElementById("quiz").innerHTML=html;
document.getElementById("score").innerHTML="Score: "+score;
}

function check(i){
if(i===questions[current].correct) document.getElementById("correctSound").play(); else document.getElementById("wrongSound").play();
if(i===questions[current].correct) score++;
current++;
show();
}

</script>
</body>
</html>
