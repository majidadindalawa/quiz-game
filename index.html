<!DOCTYPE html>
<html>
<head>
<title>Islamic Quiz Game</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}
button{
display:block;
margin:10px auto;
padding:10px 20px;
background:green;
color:white;
border:none;
font-size:16px;
}
</style>
</head>

<body>

<h1>Islamic Quiz Game</h1>

<h3 id="question"></h3>

<button onclick="checkAnswer(0)" id="a"></button>
<button onclick="checkAnswer(1)" id="b"></button>
<button onclick="checkAnswer(2)" id="c"></button>
<button onclick="checkAnswer(3)" id="d"></button>

<p id="score"></p>

<script>

let questions = [
{
q:"Wane ne Annabi na farko?",
a:["Annabi Musa","Annabi Adam","Annabi Isa","Annabi Nuh"],
correct:1
},
{
q:"A ina aka saukar da Alkur'ani?",
a:["Makka","Madina","Taif","Yemen"],
correct:0
},
{
q:"Wane ne Manzon Allah?",
a:["Musa","Isa","Muhammad (SAW)","Nuh"],
correct:2
}
];

let current=0;
let score=0;

function loadQuestion(){

document.getElementById("question").innerHTML = questions[current].q;

document.getElementById("a").innerHTML = questions[current].a[0];
document.getElementById("b").innerHTML = questions[current].a[1];
document.getElementById("c").innerHTML = questions[current].a[2];
document.getElementById("d").innerHTML = questions[current].a[3];

}

function checkAnswer(i){

if(i == questions[current].correct){
score++;
}

current++;

if(current < questions.length){
loadQuestion();
}else{
document.body.innerHTML="<h1>Game Finished</h1><h2>Your Score: "+score+"</h2>";
}

}

loadQuestion();

</script>

</body>
  </html>
