<!DOCTYPE html>
<html>
<head>
<title>Islamic Quiz Game</title>
<style>
body{font-family:Arial;text-align:center;background:#eee;}
button{display:block;margin:10px auto;padding:10px 20px;background:green;color:white;border:none;}
</style>
</head>

<body>

<h1>Islamic Quiz Game</h1>

<h2>Select Level</h2>
<button onclick="startGame(20)">Easy</button>
<button onclick="startGame(50)">Medium</button>
<button onclick="startGame(100)">Hard</button>

<div id="quiz"></div>

<script>

let allQuestions = [];

// 🔥 automatic generate 100 questions
for(let i=1;i<=100;i++){
allQuestions.push({
q:"Tambaya ta "+i+": Wane ne Annabi na farko?",
a:["Musa","Adam","Isa","Nuh"],
correct:1
});
}

let questions=[];
let current=0;
let score=0;

function startGame(num){
questions = allQuestions.slice(0,num);
current=0;
score=0;
show();
}

function show(){
if(current>=questions.length){
document.getElementById("quiz").innerHTML=
"<h2>Game Finished</h2><h3>Score: "+score+"/"+questions.length+"</h3><button onclick='location.reload()'>Play Again</button>";
return;
}

let q=questions[current];

let html="<h3>"+q.q+"</h3>";

q.a.forEach((opt,i)=>{
html+="<button onclick='check("+i+")'>"+opt+"</button>";
});

document.getElementById("quiz").innerHTML=html;
}

function check(i){
if(i===questions[current].correct) score++;
current++;
show();
}

</script>

</body>
</html>
